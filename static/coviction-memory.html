<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <meta name="theme-color" content="#111111">

  <title>Coviction — Memory</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}



    :root{

      --font-display:'Space Grotesk','Inter',sans-serif;

      --font-body:'Inter','Helvetica Neue',Arial,sans-serif;

      --bg:#0a0a0a;

      --surface-0:#111111;

      --surface-1:#1a1a1a;

      --surface-2:#222222;

      --surface-3:#2a2a2a;

      --text:#e8e6e1;

      --text-2:#a8a49e;

      --text-3:#706c66;

      --accent:#c9a227;

      --accent-dim:rgba(201,162,39,0.10);

      --accent-border:rgba(201,162,39,0.25);

      --border:rgba(255,255,255,0.06);

      --border-hover:rgba(255,255,255,0.12);

      --color-company:#c9a227;

      --color-person:#60a5fa;

      --color-concept:#a78bfa;

      --color-metric:#34d399;

      --color-sector:#f472b6;

      --radius:12px;

      --radius-sm:8px;

    }



    html,body{height:100%;overflow:hidden}

    body{

      font-family:var(--font-body);

      background:var(--bg);

      color:var(--text);

      display:flex;

      flex-direction:column;

    }



    /* ── Top Bar ─────────────────────────── */

    .topbar{

      display:flex;

      align-items:center;

      justify-content:space-between;

      padding:16px 24px;

      border-bottom:1px solid var(--border);

      background:var(--surface-0);

      flex-shrink:0;

      z-index:100;

    }

    .topbar-left{display:flex;align-items:center;gap:16px}

    .topbar-logo{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text);text-decoration:none}

    .topbar-logo span{color:var(--accent)}

    .topbar-title{font-size:13px;color:var(--text-2);font-weight:400;padding-left:16px;border-left:1px solid var(--border)}

    .topbar-nav{display:flex;gap:8px}

    .topbar-nav a{

      font-size:12px;font-weight:500;color:var(--text-3);text-decoration:none;

      padding:6px 12px;border-radius:6px;transition:all .2s;

    }

    .topbar-nav a:hover{color:var(--text-2);background:var(--surface-1)}

    .topbar-nav a.active{color:var(--accent);background:var(--accent-dim)}



    /* ── Main Layout ─────────────────────── */

    .main{display:flex;flex:1;overflow:hidden}



    /* ── Left Sidebar: Timeline/Calendar ── */

    .sidebar{

      width:300px;

      border-right:1px solid var(--border);

      display:flex;

      flex-direction:column;

      background:var(--surface-0);

      flex-shrink:0;

      overflow:hidden;

    }

    .sidebar-header{

      padding:20px 20px 16px;

      border-bottom:1px solid var(--border);

    }

    .sidebar-header h2{

      font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;

    }

    .sidebar-header p{font-size:11px;color:var(--text-3)}



    /* Calendar heatmap */

    .calendar-heatmap{

      padding:16px 20px;

      border-bottom:1px solid var(--border);

    }

    .heatmap-months{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-start}

    .heatmap-month{margin-bottom:8px}

    .heatmap-month-label{font-size:10px;color:var(--text-3);margin-bottom:4px;font-weight:500}

    .heatmap-grid{display:grid;grid-template-columns:repeat(7,12px);gap:2px}

    .heatmap-cell{

      width:12px;height:12px;border-radius:2px;

      background:var(--surface-2);transition:all .15s;cursor:pointer;

    }

    .heatmap-cell:hover{transform:scale(1.4);outline:1px solid var(--accent)}

    .heatmap-cell.level-1{background:rgba(201,162,39,0.20)}

    .heatmap-cell.level-2{background:rgba(201,162,39,0.40)}

    .heatmap-cell.level-3{background:rgba(201,162,39,0.65)}

    .heatmap-cell.level-4{background:var(--accent)}

    .heatmap-cell.today{outline:1px solid var(--accent-border)}



    /* Session list */

    .session-list{flex:1;overflow-y:auto;padding:8px}

    .session-list::-webkit-scrollbar{width:4px}

    .session-list::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}

    .session-item{

      padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;

      transition:all .15s;margin-bottom:2px;

    }

    .session-item:hover{background:var(--surface-1)}

    .session-item.active{background:var(--accent-dim);border:1px solid var(--accent-border)}

    .session-item-date{font-size:12px;font-weight:600;color:var(--text)}

    .session-item-name{font-size:11px;color:var(--text-2);margin-top:2px}

    .session-item-meta{display:flex;gap:8px;margin-top:4px}

    .session-item-badge{

      font-size:10px;color:var(--text-3);background:var(--surface-2);

      padding:2px 6px;border-radius:4px;

    }



    /* ── Right: Graph + Detail ────────────── */

    .graph-area{flex:1;position:relative;overflow:hidden;background:var(--bg)}



    #graph-canvas{width:100%;height:100%;display:block}



    /* Cluster labels */

    .cluster-label{

      position:absolute;pointer-events:none;

      font-size:10px;font-weight:600;color:var(--text-3);

      text-transform:uppercase;letter-spacing:.5px;

      opacity:0.6;white-space:nowrap;

    }



    /* Node tooltip */

    .node-tooltip{

      position:absolute;pointer-events:none;

      background:var(--surface-1);border:1px solid var(--border-hover);

      border-radius:var(--radius-sm);padding:12px 16px;

      box-shadow:0 8px 32px rgba(0,0,0,0.4);

      font-size:12px;opacity:0;transition:opacity .15s;

      max-width:260px;z-index:200;

    }

    .node-tooltip.visible{opacity:1}

    .node-tooltip-name{font-weight:600;color:var(--text);margin-bottom:4px}

    .node-tooltip-type{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}

    .node-tooltip-mentions{font-size:11px;color:var(--text-2);margin-top:6px}

    .node-tooltip-conviction{font-size:11px;margin-top:4px;font-weight:500}



    /* Detail panel (slide-in from right) */

    .detail-panel{

      position:absolute;top:0;right:0;width:380px;height:100%;

      background:var(--surface-0);border-left:1px solid var(--border);

      transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);

      z-index:150;overflow-y:auto;

      display:flex;flex-direction:column;

    }

    .detail-panel.open{transform:translateX(0)}

    .detail-panel-header{

      padding:20px;border-bottom:1px solid var(--border);

      display:flex;justify-content:space-between;align-items:flex-start;

      position:sticky;top:0;background:var(--surface-0);z-index:1;

    }

    .detail-panel-title{font-family:var(--font-display);font-size:16px;font-weight:600}

    .detail-panel-type{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

    .detail-panel-close{

      background:none;border:none;color:var(--text-3);cursor:pointer;

      font-size:18px;padding:4px 8px;border-radius:4px;

    }

    .detail-panel-close:hover{color:var(--text);background:var(--surface-2)}

    .detail-panel-content{padding:16px 20px;flex:1}

    .detail-section{margin-bottom:20px}

    .detail-section-title{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

    .mention-card{

      padding:10px 12px;background:var(--surface-1);border-radius:var(--radius-sm);

      margin-bottom:6px;border:1px solid var(--border);

    }

    .mention-card-text{font-size:12px;color:var(--text-2);line-height:1.5}

    .mention-card-meta{font-size:10px;color:var(--text-3);margin-top:4px}



    /* Deal memo button */

    .deal-memo-btn{

      display:flex;align-items:center;gap:6px;

      width:100%;padding:10px 14px;margin-bottom:16px;

      background:var(--accent-dim);border:1px solid var(--accent-border);

      border-radius:var(--radius-sm);color:var(--accent);

      font-size:12px;font-weight:600;cursor:pointer;

      transition:all .2s;

    }

    .deal-memo-btn:hover{background:rgba(201,162,39,0.18);border-color:var(--accent)}

    .deal-memo-btn:disabled{opacity:0.5;cursor:wait}

    .deal-memo-content{

      font-size:12px;color:var(--text-2);line-height:1.7;

      padding:16px;background:var(--surface-1);border-radius:var(--radius-sm);

      border:1px solid var(--border);white-space:pre-wrap;

    }

    .deal-memo-content h2,.deal-memo-content h3{color:var(--text);margin:12px 0 6px;font-size:13px}

    .deal-memo-content strong{color:var(--text)}



    /* Legend */

    .graph-legend{

      position:absolute;bottom:20px;left:20px;

      background:var(--surface-1);border:1px solid var(--border);

      border-radius:var(--radius-sm);padding:12px 16px;

      display:flex;gap:12px;font-size:11px;z-index:100;

    }

    .legend-item{display:flex;align-items:center;gap:6px}

    .legend-dot{width:8px;height:8px;border-radius:50%}



    /* Stats bar + controls */

    .graph-controls{

      position:absolute;top:16px;left:16px;right:16px;

      display:flex;justify-content:space-between;align-items:flex-start;

      z-index:100;pointer-events:none;

    }

    .graph-controls > *{pointer-events:auto}

    .graph-stats{display:flex;gap:8px;flex-wrap:wrap}

    .stat-pill{

      background:var(--surface-1);border:1px solid var(--border);

      border-radius:20px;padding:6px 14px;font-size:11px;color:var(--text-2);

    }

    .stat-pill strong{color:var(--text);font-weight:600}



    /* Replay controls */

    .replay-controls{

      display:flex;align-items:center;gap:8px;

      background:var(--surface-1);border:1px solid var(--border);

      border-radius:20px;padding:6px 12px;

    }

    .replay-btn{

      background:none;border:none;color:var(--text-2);cursor:pointer;

      font-size:14px;padding:4px 8px;border-radius:4px;transition:all .15s;

    }

    .replay-btn:hover{color:var(--accent);background:var(--accent-dim)}

    .replay-btn.active{color:var(--accent)}

    .replay-date{font-size:11px;color:var(--text-2);min-width:80px;text-align:center}



    /* Gap detection banner */

    .gap-banner{

      position:absolute;bottom:60px;left:50%;transform:translateX(-50%);

      background:var(--surface-1);border:1px solid var(--accent-border);

      border-radius:var(--radius);padding:10px 18px;

      font-size:12px;color:var(--text-2);z-index:100;

      display:none;gap:8px;align-items:center;

      box-shadow:0 8px 32px rgba(0,0,0,0.4);

      max-width:90%;text-align:center;

    }

    .gap-banner.visible{display:flex}

    .gap-banner-icon{font-size:16px}

    .gap-banner strong{color:var(--accent)}



    /* Empty state */

    .empty-state{

      display:flex;flex-direction:column;align-items:center;justify-content:center;

      height:100%;text-align:center;padding:40px;

    }

    .empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.3}

    .empty-state h3{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:8px}

    .empty-state p{font-size:13px;color:var(--text-3);max-width:300px;line-height:1.5}



    /* ── Mobile Responsiveness ─────────── */

    @media(max-width:1024px){

      .sidebar{width:260px}

      .detail-panel{width:320px}

    }



    @media(max-width:768px){

      html,body{overflow-x:hidden}

      .topbar{padding:12px 16px}

      .topbar-title{display:none}

      .main{flex-direction:column}

      .sidebar{

        width:100%;

        height:auto;

        max-height:35vh;

        border-right:none;

        border-bottom:1px solid var(--border);

        flex-shrink:0;

      }

      .calendar-heatmap{padding:12px 16px}

      .session-list{max-height:120px}

      .graph-area{flex:1;min-height:50vh}

      .detail-panel{

        width:100%;

        max-width:100%;

        border-left:none;

        border-top:1px solid var(--border);

      }

      .graph-legend{

        bottom:10px;left:10px;

        padding:8px 10px;gap:8px;font-size:10px;

        flex-wrap:wrap;

      }

      .graph-controls{top:10px;left:10px;right:10px;flex-direction:column;gap:8px}

      .graph-stats{flex-wrap:wrap}

      .stat-pill{padding:4px 10px;font-size:10px}

      .replay-controls{padding:4px 8px}

      .gap-banner{bottom:50px;padding:8px 14px;font-size:11px}

    }



    @media(max-width:480px){

      .topbar-nav a{padding:4px 8px;font-size:11px}

      .sidebar{max-height:30vh}

      .heatmap-grid{grid-template-columns:repeat(7,10px);gap:1px}

      .heatmap-cell{width:10px;height:10px}

      .legend-item span{display:none}

    }

  </style>

</head>

<body>

  <!-- Top Bar -->

  <header class="topbar">

    <div class="topbar-left">

      <a href="/app/" class="topbar-logo">co<span>.</span></a>

      <span class="topbar-title">Memory Map</span>

    </div>

    <nav class="topbar-nav">

      <a href="/app/coviction-app.html">Capture</a>

      <a href="/app/coviction-memory.html" class="active">Memory</a>

    </nav>

  </header>



  <div class="main">

    <!-- Left: Timeline sidebar -->

    <aside class="sidebar">

      <div class="sidebar-header">

        <h2>Timeline</h2>

        <p>Your demo day history</p>

      </div>

      <div class="calendar-heatmap" id="heatmap-container"></div>

      <div class="session-list" id="session-list"></div>

    </aside>



    <!-- Right: Knowledge graph -->

    <section class="graph-area">

      <canvas id="graph-canvas"></canvas>



      <div class="node-tooltip" id="tooltip"></div>



      <!-- Controls overlay -->

      <div class="graph-controls">

        <div class="graph-stats" id="graph-stats"></div>

        <div class="replay-controls">

          <button class="replay-btn" id="replay-btn" title="Time-lapse replay" onclick="toggleReplay()">&#9654;</button>

          <span class="replay-date" id="replay-date"></span>

          <button class="replay-btn" id="replay-reset" title="Reset" onclick="resetReplay()" style="font-size:11px">&#8635;</button>

        </div>

      </div>



      <div class="graph-legend">

        <div class="legend-item"><div class="legend-dot" style="background:var(--color-company)"></div><span>Company</span></div>

        <div class="legend-item"><div class="legend-dot" style="background:var(--color-person)"></div><span>Person</span></div>

        <div class="legend-item"><div class="legend-dot" style="background:var(--color-concept)"></div><span>Concept</span></div>

        <div class="legend-item"><div class="legend-dot" style="background:var(--color-sector)"></div><span>Sector</span></div>

      </div>



      <!-- Gap detection banner -->

      <div class="gap-banner" id="gap-banner">

        <span class="gap-banner-icon">&#128269;</span>

        <span id="gap-text"></span>

      </div>



      <!-- Detail slide-in panel -->

      <div class="detail-panel" id="detail-panel">

        <div class="detail-panel-header">

          <div>

            <div class="detail-panel-title" id="detail-title"></div>

            <div class="detail-panel-type" id="detail-type"></div>

          </div>

          <button class="detail-panel-close" onclick="closeDetail()">&times;</button>

        </div>

        <div class="detail-panel-content" id="detail-content"></div>

      </div>

    </section>

  </div>



  <script>

    const API = window.COVICTION_API_URL || '';

    const COLORS = {

      company: '#c9a227',

      person: '#60a5fa',

      concept: '#a78bfa',

      metric: '#34d399',

      sector: '#f472b6',

    };



    let graphData = { nodes: [], edges: [] };

    let timelineData = [];

    let simulation = null;

    let canvas, ctx;

    let hoveredNode = null;

    let selectedNode = null;

    let transform = { x: 0, y: 0, scale: 1 };

    let drag = { active: false, startX: 0, startY: 0, nodeIndex: -1 };

    let clusters = []; // Detected communities

    let replayState = { active: false, frame: 0, interval: null };



    // ── Initialize ──

    async function init() {

      canvas = document.getElementById('graph-canvas');

      ctx = canvas.getContext('2d');

      resizeCanvas();

      window.addEventListener('resize', resizeCanvas);



      await Promise.all([loadGraph(), loadTimeline()]);



      // Touch support for mobile

      canvas.addEventListener('touchstart', onTouchStart, { passive: false });

      canvas.addEventListener('touchmove', onTouchMove, { passive: false });

      canvas.addEventListener('touchend', onTouchEnd);



      // Mouse interactions

      canvas.addEventListener('mousemove', onMouseMove);

      canvas.addEventListener('mousedown', onMouseDown);

      canvas.addEventListener('mouseup', onMouseUp);

      canvas.addEventListener('wheel', onWheel, { passive: false });

      canvas.addEventListener('click', onClick);



      if (graphData.nodes.length > 0) {

        detectClusters();

        detectGaps();

        startSimulation();

      } else {

        showEmpty();

      }

    }



    function resizeCanvas() {

      const rect = canvas.parentElement.getBoundingClientRect();

      canvas.width = rect.width * window.devicePixelRatio;

      canvas.height = rect.height * window.devicePixelRatio;

      canvas.style.width = rect.width + 'px';

      canvas.style.height = rect.height + 'px';

      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

      if (simulation) render();

    }



    // ── Data Loading ──

    async function loadGraph() {

      try {

        const res = await fetch(`${API}/knowledge/graph`);

        if (!res.ok) throw new Error('Graph API failed');

        graphData = await res.json();



        // Update stats

        const stats = document.getElementById('graph-stats');

        const entityCount = graphData.nodes.filter(n => n.type !== 'sector').length;

        const edgeCount = graphData.edges.length;

        const highConviction = graphData.nodes.filter(n => n.conviction_score >= 0.7).length;

        stats.innerHTML = `

          <div class="stat-pill"><strong>${entityCount}</strong> entities</div>

          <div class="stat-pill"><strong>${edgeCount}</strong> connections</div>

          ${highConviction > 0 ? `<div class="stat-pill" style="border-color:var(--accent-border)"><strong>${highConviction}</strong> high conviction</div>` : ''}

        `;

      } catch (e) {

        console.error('Failed to load graph:', e);

        graphData = { nodes: [], edges: [] };

      }

    }



    async function loadTimeline() {

      try {

        const res = await fetch(`${API}/knowledge/graph/timeline`);

        if (!res.ok) throw new Error('Timeline API failed');

        const data = await res.json();

        timelineData = data.timeline || [];

        renderHeatmap();

        renderSessionList();

      } catch (e) {

        console.error('Failed to load timeline:', e);

      }

    }



    // ── Cluster Detection (Label Propagation) ──

    function detectClusters() {

      const nodes = graphData.nodes;

      const edges = graphData.edges;

      if (nodes.length < 3) return;



      // Build adjacency list

      const adj = {};

      nodes.forEach(n => { adj[n.id] = []; });

      edges.forEach(e => {

        if (adj[e.source]) adj[e.source].push(e.target);

        if (adj[e.target]) adj[e.target].push(e.source);

      });



      // Label propagation

      const labels = {};

      nodes.forEach((n, i) => { labels[n.id] = i; });



      for (let iter = 0; iter < 10; iter++) {

        let changed = false;

        const shuffled = [...nodes].sort(() => Math.random() - 0.5);

        for (const node of shuffled) {

          const neighbors = adj[node.id] || [];

          if (neighbors.length === 0) continue;

          // Count neighbor labels

          const counts = {};

          neighbors.forEach(nid => {

            const lbl = labels[nid];

            counts[lbl] = (counts[lbl] || 0) + 1;

          });

          // Pick most frequent

          const maxLabel = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];

          if (labels[node.id] != maxLabel) {

            labels[node.id] = parseInt(maxLabel);

            changed = true;

          }

        }

        if (!changed) break;

      }



      // Group by label

      const groups = {};

      nodes.forEach(n => {

        const lbl = labels[n.id];

        if (!groups[lbl]) groups[lbl] = [];

        groups[lbl].push(n);

      });



      // Create cluster objects (min 2 members)

      clusters = Object.values(groups)

        .filter(g => g.length >= 2)

        .map(members => {

          // Name the cluster by dominant type or sector

          const types = {};

          const sectors = {};

          members.forEach(m => {

            types[m.type] = (types[m.type] || 0) + 1;

            const s = (m.metadata || {}).sector;

            if (s && s !== 'unknown') sectors[s] = (sectors[s] || 0) + 1;

          });

          const topSector = Object.entries(sectors).sort((a, b) => b[1] - a[1])[0];

          const topType = Object.entries(types).sort((a, b) => b[1] - a[1])[0];

          let name = '';

          if (topSector && topSector[1] >= 2) {

            name = topSector[0].charAt(0).toUpperCase() + topSector[0].slice(1) + ' cluster';

          } else if (topType) {

            name = topType[0].charAt(0).toUpperCase() + topType[0].slice(1) + ' group';

          }

          return { members, name, types, sectors };

        })

        .filter(c => c.name)

        .sort((a, b) => b.members.length - a.members.length)

        .slice(0, 5);



      // Assign cluster IDs to nodes

      clusters.forEach((c, i) => {

        c.members.forEach(m => { m._cluster = i; });

      });

    }



    // ── Gap Detection ──

    function detectGaps() {

      if (clusters.length === 0) return;

      const gaps = [];



      clusters.forEach(cluster => {

        const hasCompany = cluster.members.some(m => m.type === 'company');

        const hasPerson = cluster.members.some(m => m.type === 'person');

        const hasConcept = cluster.members.some(m => m.type === 'concept');



        if (hasCompany && !hasPerson && cluster.members.length >= 3) {

          gaps.push(`<strong>${cluster.name}</strong>: ${cluster.members.length} companies but no people — need founder connections`);

        }

        if (hasCompany && !hasConcept && cluster.members.length >= 3) {

          gaps.push(`<strong>${cluster.name}</strong>: companies without a thesis — what's your conviction driver?`);

        }

      });

    // ── Time-Lapse Replay ──

    function toggleReplay() {

      if (replayState.active) {

        stopReplay();

      } else {

        startReplay();

      }

    }



    function startReplay() {

      if (!graphData.nodes.length) return;

      replayState.active = true;

      replayState.frame = 0;

      document.getElementById('replay-btn').classList.add('active');

      document.getElementById('replay-btn').innerHTML = '&#9646;&#9646;';



      // Sort nodes by first_seen date

      const sortedDates = [...new Set(

        graphData.nodes

          .filter(n => n.first_seen)

          .map(n => n.first_seen.split('T')[0])

      )].sort();



      if (sortedDates.length === 0) { stopReplay(); return; }



      // Hide all nodes initially

      graphData.nodes.forEach(n => { n._visible = false; });

      render();



      replayState.interval = setInterval(() => {

        if (replayState.frame >= sortedDates.length) {

          stopReplay();

          return;

        }

        const cutoffDate = sortedDates[replayState.frame];

        document.getElementById('replay-date').textContent = formatDate(cutoffDate);



        graphData.nodes.forEach(n => {

          if (!n.first_seen) { n._visible = true; return; }

          n._visible = n.first_seen.split('T')[0] <= cutoffDate;

        });

        render();

        replayState.frame++;

      }, 800);

    }



    function stopReplay() {

      replayState.active = false;

      if (replayState.interval) clearInterval(replayState.interval);

      document.getElementById('replay-btn').classList.remove('active');

      document.getElementById('replay-btn').innerHTML = '&#9654;';

    }



    function resetReplay() {

      stopReplay();

      graphData.nodes.forEach(n => { n._visible = true; });

      document.getElementById('replay-date').textContent = '';

      render();

    }

    // ── Force Simulation ──

    function startSimulation() {

      const W = canvas.width / window.devicePixelRatio;

      const H = canvas.height / window.devicePixelRatio;



      graphData.nodes.forEach((node, i) => {

        node.x = W / 2 + (Math.random() - 0.5) * W * 0.6;

        node.y = H / 2 + (Math.random() - 0.5) * H * 0.6;

        node.vx = 0;

        node.vy = 0;

        node.radius = getNodeRadius(node);

        node._visible = true;

      });



      const adj = {};

      graphData.edges.forEach(e => {

        if (!adj[e.source]) adj[e.source] = [];

        if (!adj[e.target]) adj[e.target] = [];

        adj[e.source].push(e.target);

        adj[e.target].push(e.source);

      });



      const nodeIndex = {};

      graphData.nodes.forEach((n, i) => nodeIndex[n.id] = i);



      simulation = { running: true, alpha: 1.0, adj, nodeIndex };

      tick();

    }



    function tick() {

      if (!simulation || !simulation.running) return;



      const nodes = graphData.nodes;

      const edges = graphData.edges;

      const W = canvas.width / window.devicePixelRatio;

      const H = canvas.height / window.devicePixelRatio;

      const alpha = simulation.alpha;



      // Repulsion

      for (let i = 0; i < nodes.length; i++) {

        for (let j = i + 1; j < nodes.length; j++) {

          let dx = nodes[j].x - nodes[i].x;

          let dy = nodes[j].y - nodes[i].y;

          let dist = Math.sqrt(dx * dx + dy * dy) || 1;

          let force = -300 * alpha / (dist * dist);

          let fx = (dx / dist) * force;

          let fy = (dy / dist) * force;

          nodes[i].vx -= fx;

          nodes[i].vy -= fy;

          nodes[j].vx += fx;

          nodes[j].vy += fy;

        }

      }



      // Attraction

      edges.forEach(e => {

        const si = simulation.nodeIndex[e.source];

        const ti = simulation.nodeIndex[e.target];

        if (si === undefined || ti === undefined) return;

        let dx = nodes[ti].x - nodes[si].x;

        let dy = nodes[ti].y - nodes[si].y;

        let dist = Math.sqrt(dx * dx + dy * dy) || 1;

        let force = (dist - 80) * 0.02 * alpha;

        let fx = (dx / dist) * force;

        let fy = (dy / dist) * force;

        nodes[si].vx += fx;

        nodes[si].vy += fy;

        nodes[ti].vx -= fx;

        nodes[ti].vy -= fy;

      });



      // Center gravity

      nodes.forEach(n => {

        n.vx += (W / 2 - n.x) * 0.001 * alpha;

        n.vy += (H / 2 - n.y) * 0.001 * alpha;

      });



      // Apply velocity

      nodes.forEach(n => {

        if (n._dragging) return;

        n.vx *= 0.6;

        n.vy *= 0.6;

        n.x += n.vx;

        n.y += n.vy;

        n.x = Math.max(40, Math.min(W - 40, n.x));

        n.y = Math.max(40, Math.min(H - 40, n.y));

      });



      simulation.alpha *= 0.995;

      if (simulation.alpha < 0.001) simulation.alpha = 0.001;



      render();

      requestAnimationFrame(tick);

    }



    function render() {

      const W = canvas.width / window.devicePixelRatio;

      const H = canvas.height / window.devicePixelRatio;

      ctx.clearRect(0, 0, W, H);



      ctx.save();

      ctx.translate(transform.x, transform.y);

      ctx.scale(transform.scale, transform.scale);



      // Draw cluster backgrounds

      clusters.forEach((cluster, ci) => {

        const visibleMembers = cluster.members.filter(m => m._visible !== false && m.x);

        if (visibleMembers.length < 2) return;

        const cx = visibleMembers.reduce((s, m) => s + m.x, 0) / visibleMembers.length;

        const cy = visibleMembers.reduce((s, m) => s + m.y, 0) / visibleMembers.length;

        const maxDist = Math.max(60, ...visibleMembers.map(m => Math.sqrt((m.x - cx) ** 2 + (m.y - cy) ** 2)));



        ctx.beginPath();

        ctx.arc(cx, cy, maxDist + 30, 0, Math.PI * 2);

        ctx.fillStyle = `rgba(201,162,39,${0.02 + ci * 0.005})`;

        ctx.fill();



        // Cluster label

        ctx.font = '500 9px Inter, sans-serif';

        ctx.fillStyle = 'rgba(255,255,255,0.25)';

        ctx.textAlign = 'center';

        ctx.fillText(cluster.name.toUpperCase(), cx, cy - maxDist - 12);

      });



      // Draw edges

      graphData.edges.forEach(e => {

        const si = simulation?.nodeIndex[e.source];

        const ti = simulation?.nodeIndex[e.target];

        if (si === undefined || ti === undefined) return;

        const s = graphData.nodes[si];

        const t = graphData.nodes[ti];

        if (s._visible === false || t._visible === false) return;



        ctx.beginPath();

        ctx.moveTo(s.x, s.y);

        ctx.lineTo(t.x, t.y);



        const isHighlighted = hoveredNode && (hoveredNode.id === e.source || hoveredNode.id === e.target);

        ctx.strokeStyle = isHighlighted

          ? `rgba(201,162,39,${0.3 + e.weight * 0.1})`

          : `rgba(255,255,255,${0.03 + e.weight * 0.02})`;

        ctx.lineWidth = isHighlighted ? 1.5 : 0.5;

        ctx.stroke();

      });



      // Draw nodes with conviction gradient

      graphData.nodes.forEach(node => {

        if (node._visible === false) return;



        const baseColor = COLORS[node.type] || '#666';

        const isHovered = hoveredNode && hoveredNode.id === node.id;

        const isSelected = selectedNode && selectedNode.id === node.id;

        const isConnected = hoveredNode && isNodeConnected(hoveredNode.id, node.id);

        const dimmed = hoveredNode && !isHovered && !isConnected;



        // Conviction-based intensity: higher conviction = more opaque/larger glow

        const conviction = node.conviction_score || 0;

        const hasConviction = conviction > 0;



        ctx.beginPath();

        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);



        // High conviction glow ring

        if (hasConviction && conviction >= 0.6 && !dimmed) {

          ctx.save();

          ctx.shadowColor = baseColor;

          ctx.shadowBlur = 8 + conviction * 15;

          ctx.fillStyle = 'transparent';

          ctx.fill();

          ctx.restore();

          ctx.beginPath();

          ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);

        }



        // Hovered/selected glow

        if (isHovered || isSelected) {

          ctx.shadowColor = baseColor;

          ctx.shadowBlur = 20;

        }



        // Fill with conviction-based opacity

        const alpha_val = dimmed ? 0.15 : (hasConviction ? 0.5 + conviction * 0.5 : 0.7);

        ctx.fillStyle = dimmed ? `rgba(${hexToRgb(baseColor)},0.15)` : `rgba(${hexToRgb(baseColor)},${alpha_val})`;

        ctx.globalAlpha = dimmed ? 0.4 : 1;

        ctx.fill();

        ctx.shadowBlur = 0;

        ctx.globalAlpha = 1;



        // Conviction ring (outer ring showing score)

        if (hasConviction && conviction > 0.3 && !dimmed) {

          ctx.beginPath();

          ctx.arc(node.x, node.y, node.radius + 3, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * conviction));

          ctx.strokeStyle = `rgba(${hexToRgb(baseColor)},0.6)`;

          ctx.lineWidth = 2;

          ctx.stroke();

        }



        // Border

        if (isHovered || isSelected) {

          ctx.beginPath();

          ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);

          ctx.strokeStyle = '#fff';

          ctx.lineWidth = 2;

          ctx.stroke();

        }



        // Label

        if (node.radius > 5 || isHovered || isConnected) {

          ctx.font = `${isHovered ? '600' : '400'} ${isHovered ? 12 : 10}px Inter, sans-serif`;

          ctx.fillStyle = dimmed ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.85)';

          ctx.textAlign = 'center';

          ctx.fillText(node.label, node.x, node.y + node.radius + 14);

        }

      });



      ctx.restore();

    }



    // ── Interaction Handlers ──

    function onMouseMove(e) {

      const rect = canvas.getBoundingClientRect();

      const mx = (e.clientX - rect.left - transform.x) / transform.scale;

      const my = (e.clientY - rect.top - transform.y) / transform.scale;



      if (drag.active && drag.nodeIndex >= 0) {

        const node = graphData.nodes[drag.nodeIndex];

        node.x = mx;

        node.y = my;

        node._dragging = true;

        render();

        return;

      }



      if (drag.active && drag.nodeIndex === -1) {

        transform.x = e.clientX - drag.startX;

        transform.y = e.clientY - drag.startY;

        render();

        return;

      }



      const prev = hoveredNode;

      hoveredNode = null;

      for (let i = graphData.nodes.length - 1; i >= 0; i--) {

        const n = graphData.nodes[i];

        if (n._visible === false) continue;

        const dist = Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2);

        if (dist < n.radius + 4) {

          hoveredNode = n;

          break;

        }

      }



      // Tooltip

      const tooltip = document.getElementById('tooltip');

      if (hoveredNode) {

        canvas.style.cursor = 'pointer';

        const convHtml = hoveredNode.conviction_score > 0

          ? `<div class="node-tooltip-conviction" style="color:${hoveredNode.conviction_score >= 0.7 ? '#34d399' : hoveredNode.conviction_score >= 0.4 ? '#c9a227' : '#f87171'}">${Math.round(hoveredNode.conviction_score * 100)}% conviction</div>`

          : '';

          ${convHtml}

        `;

        tooltip.style.left = (e.clientX - rect.left + 16) + 'px';

        tooltip.style.top = (e.clientY - rect.top - 10) + 'px';

        tooltip.classList.add('visible');

      } else {

        canvas.style.cursor = drag.active ? 'grabbing' : 'default';

        tooltip.classList.remove('visible');

      }



      if (prev !== hoveredNode) render();

    }



    function onMouseDown(e) {

      const rect = canvas.getBoundingClientRect();

      const mx = (e.clientX - rect.left - transform.x) / transform.scale;

      const my = (e.clientY - rect.top - transform.y) / transform.scale;



      for (let i = graphData.nodes.length - 1; i >= 0; i--) {

        const n = graphData.nodes[i];

        if (n._visible === false) continue;

        const dist = Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2);

        if (dist < n.radius + 4) {

          drag = { active: true, nodeIndex: i, startX: mx, startY: my };

          return;

        }

      }

      drag = { active: true, nodeIndex: -1, startX: e.clientX - transform.x, startY: e.clientY - transform.y };

    }



    function onMouseUp(e) {

      if (drag.nodeIndex >= 0) {

        graphData.nodes[drag.nodeIndex]._dragging = false;

      }

      drag = { active: false, nodeIndex: -1, startX: 0, startY: 0 };

    }



    function onClick(e) {

      if (hoveredNode) {

        selectedNode = hoveredNode;

        openDetail(hoveredNode);

      }

    }



    function onWheel(e) {

      e.preventDefault();

      const rect = canvas.getBoundingClientRect();

      const mx = e.clientX - rect.left;

      const my = e.clientY - rect.top;

      const delta = e.deltaY > 0 ? 0.9 : 1.1;

      const newScale = Math.max(0.3, Math.min(3, transform.scale * delta));

      transform.x = mx - (mx - transform.x) * (newScale / transform.scale);

      transform.y = my - (my - transform.y) * (newScale / transform.scale);

      transform.scale = newScale;

      render();

    }



    // ── Touch handlers (mobile) ──

    let lastTouchDist = 0;

    function onTouchStart(e) {

      e.preventDefault();

      if (e.touches.length === 1) {

        const t = e.touches[0];

        const rect = canvas.getBoundingClientRect();

        const mx = (t.clientX - rect.left - transform.x) / transform.scale;

        const my = (t.clientY - rect.top - transform.y) / transform.scale;

        for (let i = graphData.nodes.length - 1; i >= 0; i--) {

          const n = graphData.nodes[i];

          if (n._visible === false) continue;

          const dist = Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2);

          if (dist < n.radius + 8) {

            drag = { active: true, nodeIndex: i, startX: mx, startY: my };

            return;

          }

        }

        drag = { active: true, nodeIndex: -1, startX: t.clientX - transform.x, startY: t.clientY - transform.y };

      } else if (e.touches.length === 2) {

        const dx = e.touches[0].clientX - e.touches[1].clientX;

        const dy = e.touches[0].clientY - e.touches[1].clientY;

        lastTouchDist = Math.sqrt(dx * dx + dy * dy);

      }

    }



    function onTouchMove(e) {

      e.preventDefault();

      if (e.touches.length === 1 && drag.active) {

        const t = e.touches[0];

        if (drag.nodeIndex >= 0) {

          const rect = canvas.getBoundingClientRect();

          const mx = (t.clientX - rect.left - transform.x) / transform.scale;

          const my = (t.clientY - rect.top - transform.y) / transform.scale;

          graphData.nodes[drag.nodeIndex].x = mx;

          graphData.nodes[drag.nodeIndex].y = my;

          graphData.nodes[drag.nodeIndex]._dragging = true;

        } else {

          transform.x = t.clientX - drag.startX;

          transform.y = t.clientY - drag.startY;

        }

        render();

      } else if (e.touches.length === 2) {

        const dx = e.touches[0].clientX - e.touches[1].clientX;

        const dy = e.touches[0].clientY - e.touches[1].clientY;

        const dist = Math.sqrt(dx * dx + dy * dy);

        if (lastTouchDist > 0) {

          const scale = dist / lastTouchDist;

          transform.scale = Math.max(0.3, Math.min(3, transform.scale * scale));

          render();

        }

        lastTouchDist = dist;

      }

    }



    function onTouchEnd(e) {

      if (drag.nodeIndex >= 0) {

        graphData.nodes[drag.nodeIndex]._dragging = false;

      }

      if (e.touches.length === 0 && hoveredNode) {

        selectedNode = hoveredNode;

        openDetail(hoveredNode);

      }

      drag = { active: false, nodeIndex: -1, startX: 0, startY: 0 };

      lastTouchDist = 0;

    }

      output.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--text-3)">Writing deal memo...</div>';



      try {

        const res = await fetch(`${API}/knowledge/graph/deal-memo/${entityId}`, { method: 'POST' });

        if (!res.ok) throw new Error('Memo generation failed');

        const data = await res.json();

        // Simple markdown rendering

        const html = data.memo

          .replace(/^## (.+)$/gm, '<h2>$1</h2>')

          .replace(/^### (.+)$/gm, '<h3>$1</h3>')

          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')

          .replace(/^- (.+)$/gm, '&bull; $1')

          .replace(/\n/g, '<br>');

        output.innerHTML = `<div class="deal-memo-content">${html}</div>`;

      } catch (e) {

        output.innerHTML = `<div style="padding:12px;font-size:11px;color:#f87171">Failed to generate memo. ${e.message}</div>`;

      }

      btn.disabled = false;

      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Regenerate Memo`;

    }



    function closeDetail() {

      document.getElementById('detail-panel').classList.remove('open');

      selectedNode = null;

      render();

    }



    function focusNode(id) {

      const node = graphData.nodes.find(n => n.id === id);

      if (node) {

        selectedNode = node;

        hoveredNode = node;

        openDetail(node);

        render();

      }

    }



    // ── Helpers ──

    function getNodeRadius(node) {

      const base = node.type === 'sector' ? 5 : 4;

      const mentionBonus = Math.min(node.mentions * 2, 14);

      // Conviction makes nodes larger

      const convictionBonus = (node.conviction_score || 0) * 8;

      return base + mentionBonus + convictionBonus;

    }



    function isNodeConnected(sourceId, targetId) {

      return graphData.edges.some(e =>

        (e.source === sourceId && e.target === targetId) ||

        (e.target === sourceId && e.source === targetId)

      );

    }



    function getConnectedNodes(nodeId) {

      const connectedIds = new Set();

      graphData.edges.forEach(e => {

        if (e.source === nodeId) connectedIds.add(e.target);

        if (e.target === nodeId) connectedIds.add(e.source);

      });

      return graphData.nodes.filter(n => connectedIds.has(n.id));

    }



    function hexToRgb(hex) {

      const r = parseInt(hex.slice(1, 3), 16);

      const g = parseInt(hex.slice(3, 5), 16);

      const b = parseInt(hex.slice(5, 7), 16);

      return `${r},${g},${b}`;

    }



    function formatDate(dateStr) {

      const d = new Date(dateStr + 'T00:00:00');

      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    }



    function truncate(str, len) {

      return str.length > len ? str.slice(0, len) + '...' : str;

    }



    function showEmpty() {

      const area = document.querySelector('.graph-area');

      area.innerHTML = `

        <div class="empty-state">

          <div class="empty-state-icon">&#x1f578;</div>

          <h3>Your knowledge graph is empty</h3>

          <p>Start capturing observations at demo days. As you add notes, entities will be extracted and connections will form here automatically.</p>

        </div>

      `;

    }



    // ── Boot ──

    init();

  </script>

</body>

</html>
